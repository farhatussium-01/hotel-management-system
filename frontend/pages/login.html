<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Management System - Login</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="logo">
                <h1>Hotel Management System</h1>
                <p>Welcome Back</p>
            </div>

            <form id="loginForm" class="form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div id="errorMessage" class="error-message"></div>

                <button type="submit" class="btn btn-primary">Login</button>

                <div class="links">
                    <a href="#" id="forgotPasswordLink">Forgot Password?</a>
                    <a href="register.html">Register New Guest Account</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotPasswordModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Forgot Password</h2>
            <form id="forgotPasswordForm" class="form">
                <div class="form-group">
                    <label for="forgotUsername">Username</label>
                    <input type="text" id="forgotUsername" name="username" required>
                </div>

                <div class="form-group">
                    <label for="forgotDob">Date of Birth (YYYY-MM-DD)</label>
                    <input type="date" id="forgotDob" name="dob" required>
                </div>

                <div id="forgotErrorMessage" class="error-message"></div>
                <div id="forgotSuccessMessage" class="success-message"></div>

                <button type="submit" class="btn btn-primary">Verify Identity</button>
            </form>

            <form id="resetPasswordForm" class="form" style="display: none;">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" name="new_password" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirm_password" required>
                </div>

                <div id="resetErrorMessage" class="error-message"></div>

                <button type="submit" class="btn btn-primary">Reset Password</button>
            </form>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
